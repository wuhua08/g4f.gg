name: 🚀 G4F 自动续期

on:   
  workflow_dispatch: # 允许你在 GitHub 页面上点击按钮手动触发测试

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 拉取仓库代码
      uses: actions/checkout@v4

    - name: 🐍 初始化 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 开启缓存，加速后续运行

    - name: 📦 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: 🌐 安装自动化浏览器及环境
      run: |
        # SeleniumBase 会自动下载匹配的 ChromeDriver 并配置系统依赖
        seleniumbase install chromedriver
        # Ubuntu 环境默认自带 Chrome 浏览器和 Xvfb 虚拟显示器支持

    - name: 🏃 运行续期脚本
      env:
        # ⚠️ 请确保你在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中配置了这两个变量
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        python renew.py
